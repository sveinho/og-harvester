name: Execute Web Scraper

on:
  schedule:
    # Runs everyday at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allows you to manually trigger the workflow from the Actions tab

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the repository content
    - name: Check out repository
      uses: actions/checkout@v4

    # Step 2: Set up the Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # Speeds up subsequent runs

    # Step 3: Install required libraries
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Step 4: Run the actual scraper script
    - name: Run Web Scraper
      run: python scraper.py

    # Step 5: Commit and push changes if the CSV was modified
    - name: Commit and Push Data
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add scraped_quotes.csv
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated data update: $(date -u +'%Y-%m-%d %H:%M:%S') UTC" && git push)
